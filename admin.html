<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard · Carla Guerrero Nutricionista</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style>
  /* ══════════════════════════════════════════════════════════════
     BASE
  ══════════════════════════════════════════════════════════════ */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:#FAF7F2;color:#1C1410;min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#F0EBE5}
  ::-webkit-scrollbar-thumb{background:#C4A090;border-radius:3px}

  /* ══════════════════════════════════════════════════════════════
     TOPBAR
  ══════════════════════════════════════════════════════════════ */
  .topbar{
    background:#fff;border-bottom:1px solid rgba(180,150,130,.2);
    padding:0 36px;height:66px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:200;box-shadow:0 2px 14px rgba(30,20,12,.06);
  }
  .topbar-left{display:flex;align-items:center;gap:16px}
  .topbar-logo{width:52px;height:auto;mix-blend-mode:multiply}
  .topbar-brand .title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#0E0A06}
  .topbar-brand .role{font-size:.7rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#C96848;margin-top:1px}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .btn-sm{
    padding:8px 18px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;
    border:1.5px solid rgba(180,150,130,.3);background:transparent;color:#3D2D24;
  }
  .btn-sm:hover{border-color:#C96848;color:#C96848;background:#FDF5F0}
  .btn-sm.danger:hover{border-color:#C04040;color:#C04040;background:#FFF0F0}

  /* ══════════════════════════════════════════════════════════════
     MAIN LAYOUT
  ══════════════════════════════════════════════════════════════ */
  .main{max-width:1300px;margin:0 auto;padding:36px 28px 100px}

  /* ── PAGE HEADER ── */
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
  .page-header-text h1{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:800;color:#0E0A06;line-height:1.05}
  .page-header-text p{font-size:.95rem;color:#4A3428;margin-top:3px}
  .export-btns{display:flex;gap:8px;flex-wrap:wrap}
  .btn-export{
    display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:99px;
    font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:.22s;
    border:1.5px solid rgba(180,150,130,.3);background:#fff;color:#2A1F18;
    box-shadow:0 2px 8px rgba(30,20,12,.05);
  }
  .btn-export:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(30,20,12,.1)}
  .btn-export.xlsx{border-color:rgba(34,139,34,.3);color:#1A6B1A}
  .btn-export.xlsx:hover{background:#F0FAF0;border-color:#228B22}
  .btn-export.csv{border-color:rgba(30,100,180,.3);color:#1A4A8A}
  .btn-export.csv:hover{background:#F0F4FF;border-color:#1E64B4}

  /* ── STATS ── */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
  .stat-card{
    background:#fff;border:1px solid rgba(180,150,130,.18);border-radius:16px;
    padding:22px 24px;box-shadow:0 4px 18px rgba(30,20,12,.055);
    display:flex;align-items:center;gap:16px;transition:.2s;
  }
  .stat-card:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(30,20,12,.09)}
  .stat-icon{font-size:1.8rem;flex-shrink:0}
  .stat-num{font-size:2.2rem;font-weight:800;color:#0E0A06;font-family:'Cormorant Garamond',serif;line-height:1}
  .stat-lbl{font-size:.74rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#7A6058;margin-top:4px}
  .stat-card.unread .stat-num{color:#C96848}
  .stat-card.unread{border-color:rgba(201,104,72,.22);background:linear-gradient(135deg,#fff 60%,#FDF5F0)}

  /* ── FILTERS ── */
  .filters-bar{
    background:#fff;border:1px solid rgba(180,150,130,.2);border-radius:14px;
    padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    margin-bottom:18px;box-shadow:0 2px 10px rgba(30,20,12,.04);
  }
  .filter-group{display:flex;align-items:center;gap:8px;flex:1;min-width:200px}
  .filter-group label{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7A6058;white-space:nowrap}
  .filter-input{
    flex:1;padding:9px 14px;border:1.5px solid rgba(180,150,130,.28);border-radius:8px;
    font-family:'DM Sans',sans-serif;font-size:.9rem;color:#1C1410;background:#FDFAF6;
    outline:none;transition:.2s;
  }
  .filter-input:focus{border-color:#C96848;box-shadow:0 0 0 3px rgba(201,104,72,.1)}
  .filter-input::placeholder{color:#A89088}
  .filter-sep{width:1px;height:32px;background:rgba(180,150,130,.25);flex-shrink:0}
  .btn-filter-clear{
    padding:9px 18px;border-radius:8px;border:1.5px solid rgba(180,150,130,.3);
    background:transparent;color:#7A6058;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;
  }
  .btn-filter-clear:hover{border-color:#C96848;color:#C96848}

  /* ── TABLE CONTROLS ── */
  .table-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
  .result-count{font-size:.84rem;color:#7A6058;font-weight:600}
  .filter-tag{
    display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;
    background:#FDF5F0;border:1px solid rgba(201,104,72,.2);font-size:.76rem;font-weight:700;color:#A84830;
  }

  /* ── TABLE ── */
  .table-wrap{
    background:#fff;border:1px solid rgba(180,150,130,.18);border-radius:18px;
    overflow:hidden;box-shadow:0 6px 32px rgba(30,20,12,.08);
  }
  table{width:100%;border-collapse:collapse}
  thead th{
    padding:13px 16px;text-align:left;
    font-size:.7rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
    color:#7A6058;background:#FBF8F3;border-bottom:1px solid rgba(180,150,130,.18);
    white-space:nowrap;
  }
  thead th.sortable{cursor:pointer;user-select:none}
  thead th.sortable:hover{color:#C96848}
  tbody tr{border-bottom:1px solid rgba(180,150,130,.1);transition:background .15s;cursor:pointer}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#FDF5F0}
  tbody tr.unread-row{background:linear-gradient(90deg,rgba(201,104,72,.04) 0%,transparent 60%)}
  tbody tr.unread-row:hover{background:linear-gradient(90deg,rgba(201,104,72,.08) 0%,#FDF5F0 60%)}
  td{padding:14px 16px;font-size:.91rem;color:#2A1F18;vertical-align:middle}
  td.td-status{width:38px;text-align:center;padding-right:4px}
  td.td-name{font-weight:700;color:#0E0A06}
  td.td-email{color:#3D2D24}
  td.td-phone{color:#4A3428}
  td.td-date{color:#7A6058;font-size:.84rem;white-space:nowrap}
  td.td-actions{text-align:right;white-space:nowrap;padding-right:14px}

  /* status dot */
  .dot-new{
    display:inline-block;width:10px;height:10px;border-radius:50%;
    background:#C96848;box-shadow:0 0 0 3px rgba(201,104,72,.2);
    animation:pulse 2s ease infinite;flex-shrink:0;
  }
  .dot-ok{display:inline-block;width:10px;height:10px;border-radius:50%;background:#C4D4BC;flex-shrink:0}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(201,104,72,.2)}50%{box-shadow:0 0 0 6px rgba(201,104,72,.08)}}

  .btn-row{
    padding:5px 14px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.78rem;
    font-weight:700;cursor:pointer;transition:.18s;border:1.5px solid;margin-left:4px;
  }
  .btn-view{border-color:rgba(201,104,72,.35);color:#C96848;background:transparent}
  .btn-view:hover{background:#C96848;color:#fff;border-color:#C96848}
  .btn-review-row{border-color:rgba(180,150,130,.3);color:#7A6058;background:transparent}
  .btn-review-row:hover{border-color:#5A8A50;color:#5A8A50;background:#F2F8F0}
  .btn-review-row.done{border-color:rgba(90,138,80,.3);color:#5A8A50}
  .btn-del-row{border-color:rgba(180,150,130,.25);color:#A89088;background:transparent}
  .btn-del-row:hover{border-color:#C04040;color:#C04040;background:#FFF0F0}

  /* ── EMPTY / LOADING ── */
  .state-box{text-align:center;padding:80px 24px}
  .state-box .icon{font-size:3.2rem;margin-bottom:18px;display:block}
  .state-box h3{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:#2A1F18;margin-bottom:8px}
  .state-box p{color:#7A6058;font-size:.93rem}
  .spin-icon{animation:spin 1s linear infinite;display:inline-block;font-size:1.9rem}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ══════════════════════════════════════════════════════════════
     MODAL — FICHA CLÍNICA
  ══════════════════════════════════════════════════════════════ */
  .modal-bg{
    position:fixed;inset:0;background:rgba(14,10,6,.52);backdrop-filter:blur(5px);
    display:none;align-items:flex-start;justify-content:center;z-index:500;padding:24px;
    overflow-y:auto;
  }
  .modal-bg.open{display:flex;animation:fade-bg .22s ease}
  @keyframes fade-bg{from{opacity:0}to{opacity:1}}

  .modal{
    background:#fff;border-radius:22px;max-width:780px;width:100%;margin:auto;
    box-shadow:0 40px 120px rgba(14,10,6,.22);
    animation:modal-up .32s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes modal-up{from{transform:translateY(28px) scale(.96);opacity:0}to{transform:none;opacity:1}}

  /* Modal header */
  .modal-hdr{
    padding:28px 32px 22px;border-bottom:1px solid rgba(180,150,130,.18);
    display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
    background:linear-gradient(135deg,#FDFAF6 0%,#FDF5F0 100%);border-radius:22px 22px 0 0;
  }
  .modal-hdr-left h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:800;color:#0E0A06}
  .modal-hdr-left .modal-meta{font-size:.83rem;color:#7A6058;margin-top:3px}
  .modal-hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .btn-modal{
    padding:8px 16px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:.2s;border:1.5px solid;display:flex;align-items:center;gap:6px;
  }
  .btn-print{border-color:rgba(30,100,180,.3);color:#1A4A8A;background:transparent}
  .btn-print:hover{background:#1A4A8A;color:#fff;border-color:#1A4A8A}
  .btn-modal-review{border-color:rgba(90,138,80,.3);color:#5A8A50;background:transparent}
  .btn-modal-review:hover{background:#5A8A50;color:#fff;border-color:#5A8A50}
  .btn-modal-review.reviewed{background:#5A8A50;color:#fff;border-color:#5A8A50}
  .btn-close{
    width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(180,150,130,.28);
    background:transparent;font-size:1.1rem;cursor:pointer;transition:.18s;
    display:flex;align-items:center;justify-content:center;color:#7A6058;flex-shrink:0;
  }
  .btn-close:hover{background:#FDF5F0;border-color:#C96848;color:#C96848}

  /* Modal body — ficha clínica */
  .modal-body{padding:28px 32px 36px}
  .clinic-section{margin-bottom:30px}
  .clinic-section:last-child{margin-bottom:0}
  .clinic-section-title{
    display:flex;align-items:center;gap:10px;
    font-size:.7rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
    color:#C96848;margin-bottom:16px;padding-bottom:10px;
    border-bottom:2px solid rgba(201,104,72,.15);
  }
  .clinic-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .clinic-field{padding:10px 0;border-bottom:1px solid rgba(180,150,130,.1)}
  .clinic-field:nth-last-child(-n+2){border-bottom:none}
  .clinic-field.full{grid-column:1/-1}
  .clinic-field .cf-key{font-size:.73rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#A89088;margin-bottom:3px}
  .clinic-field .cf-val{font-size:.95rem;color:#1C1410;font-weight:500;line-height:1.5;word-break:break-word}
  .clinic-field .cf-val.empty{color:#C4B8B0;font-style:italic;font-weight:400}
  .clinic-field .cf-val.highlight{
    color:#C96848;font-weight:700;
    background:#FDF5F0;padding:3px 8px;border-radius:6px;display:inline-block;
  }

  /* Badge de revisión en modal */
  .review-badge{
    display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;
    font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    border:1.5px solid;
  }
  .review-badge.new{border-color:rgba(201,104,72,.4);color:#A84830;background:#FDF5F0}
  .review-badge.done{border-color:rgba(90,138,80,.4);color:#3A6A30;background:#F2F8F0}

  /* ══════════════════════════════════════════════════════════════
     PRINT STYLES  —  @media print
  ══════════════════════════════════════════════════════════════ */
  @media print {
    @page{margin:18mm 16mm;size:A4 portrait}
    body{background:#fff!important;color:#000!important}
    .topbar,.main,.modal-bg > *:not(.modal){display:none!important}
    .modal-bg{
      position:static!important;background:none!important;backdrop-filter:none!important;
      display:block!important;padding:0!important;overflow:visible!important;
    }
    .modal{
      box-shadow:none!important;border-radius:0!important;max-width:100%!important;
      margin:0!important;animation:none!important;
    }
    .modal-hdr{
      background:#FAF7F2!important;border-bottom:2px solid #C96848!important;
      page-break-after:avoid;border-radius:0!important;
    }
    .modal-hdr-right{display:none!important}
    .btn-close{display:none!important}
    .modal-body{padding:20px 0!important}
    .clinic-section{page-break-inside:avoid}
    .clinic-section-title{color:#C96848!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .clinic-field .cf-val.highlight{
      background:#FDF5F0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
    .print-footer{
      display:flex!important;align-items:center;justify-content:space-between;
      border-top:1px solid #E0D0C8;margin-top:24px;padding-top:14px;
      font-size:.78rem;color:#7A6058;
    }
  }
  .print-footer{display:none}/* hidden on screen, shown on print */

  /* ══════════════════════════════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════════════════════════════ */
  @media(max-width:900px){
    .stats-row{grid-template-columns:1fr 1fr}
    .topbar{padding:0 18px}
    .main{padding:24px 16px 80px}
  }
  @media(max-width:640px){
    .stats-row{grid-template-columns:1fr 1fr}
    .page-header{flex-direction:column;align-items:flex-start}
    .filters-bar{flex-direction:column;align-items:stretch}
    .filter-sep{display:none}
    table thead{display:none}
    tbody tr{display:block;padding:14px 16px;border-bottom:1px solid rgba(180,150,130,.12)}
    td{display:block;padding:3px 0}
    td::before{content:attr(data-label);font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#A89088;display:block}
    td.td-status{display:inline-block;width:auto;padding:0;margin-bottom:4px}
    td.td-actions{text-align:left;margin-top:8px}
    .clinic-grid{grid-template-columns:1fr}
    .clinic-field.full{grid-column:1}
    .modal{border-radius:14px}
    .modal-hdr{padding:20px}
    .modal-body{padding:18px}
    .modal-hdr-right{flex-wrap:wrap}
  }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════ TOPBAR -->
<nav class="topbar">
  <div class="topbar-left">
    <img src="/logo.png" class="topbar-logo" alt="Logo Carla Guerrero"/>
    <div class="topbar-brand">
      <div class="title">Dashboard</div>
      <div class="role">Nutricionista · Área privada</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-sm" onclick="loadData()">↺ Actualizar</button>
    <a href="/admin/logout" class="btn-sm danger">Cerrar sesión</a>
  </div>
</nav>

<!-- ═══════════════════════════════════════════ MAIN -->
<main class="main">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-text">
      <h1>Fichas Nutricionales</h1>
      <p>Gestiona y revisa las fichas recibidas de tus pacientes</p>
    </div>
    <div class="export-btns">
      <button class="btn-export xlsx" onclick="exportXLSX()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Exportar Excel
      </button>
      <button class="btn-export csv" onclick="exportCSV()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">📋</div>
      <div><div class="stat-num" id="sTotal">—</div><div class="stat-lbl">Total fichas</div></div>
    </div>
    <div class="stat-card unread">
      <div class="stat-icon">🔴</div>
      <div><div class="stat-num" id="sSinRevisar">—</div><div class="stat-lbl">Sin revisar</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🌅</div>
      <div><div class="stat-num" id="sHoy">—</div><div class="stat-lbl">Hoy</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div><div class="stat-num" id="sSemana">—</div><div class="stat-lbl">Esta semana</div></div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <div class="filter-group" style="flex:2;min-width:240px">
      <label>🔍 Buscar</label>
      <input type="text" class="filter-input" id="searchInput"
        placeholder="Nombre, apellido, email o teléfono..." oninput="applyFilters()"/>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <label>Desde</label>
      <input type="date" class="filter-input" id="dateFrom" oninput="applyFilters()" style="min-width:140px"/>
    </div>
    <div class="filter-group">
      <label>Hasta</label>
      <input type="date" class="filter-input" id="dateTo" oninput="applyFilters()" style="min-width:140px"/>
    </div>
    <div class="filter-group" style="flex:0;min-width:auto">
      <label>Estado</label>
      <select class="filter-input" id="filterReviewed" onchange="applyFilters()" style="min-width:140px">
        <option value="">Todas</option>
        <option value="false">Sin revisar</option>
        <option value="true">Revisadas</option>
      </select>
    </div>
    <button class="btn-filter-clear" onclick="clearFilters()">✕ Limpiar</button>
  </div>

  <!-- TABLE CONTROLS -->
  <div class="table-controls">
    <span class="result-count" id="resultCount"></span>
    <span id="activeFilters"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap" id="tableWrap">
    <div class="state-box">
      <span class="icon"><span class="spin-icon">⏳</span></span>
      <h3>Cargando fichas...</h3>
    </div>
  </div>

</main>

<!-- ═══════════════════════════════════════════ MODAL FICHA CLÍNICA -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal" onclick="event.stopPropagation()">

    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <h2 id="mName">—</h2>
        <div class="modal-meta" id="mMeta">—</div>
      </div>
      <div class="modal-hdr-right">
        <button class="btn-modal btn-modal-review" id="btnModalReview" onclick="toggleReviewModal()">
          ✓ Marcar revisada
        </button>
        <button class="btn-modal btn-print" onclick="printFicha()">
          🖨 Imprimir / PDF
        </button>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
    </div>

    <div class="modal-body" id="mBody">
      <div class="state-box"><span class="spin-icon">⏳</span></div>
    </div>

    <!-- Print footer (hidden on screen) -->
    <div class="print-footer" id="printFooter">
      <span>Carla Guerrero · Nutricionista</span>
      <span id="printDate"></span>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════ SCRIPTS -->
<script>
/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
let allSubmissions = [];
let filtered       = [];
let currentId      = null;

/* ══════════════════════════════════════════════════════════════
   LOAD DATA
══════════════════════════════════════════════════════════════ */
async function loadData() {
  setTableLoading();
  try {
    const [sRes, fRes] = await Promise.all([
      fetch('/api/stats'),
      fetch('/api/submissions')
    ]);

    if (sRes.ok) {
      const { stats } = await sRes.json();
      el('sTotal').textContent      = stats.total       || '0';
      el('sSinRevisar').textContent = stats.sin_revisar || '0';
      el('sHoy').textContent        = stats.hoy         || '0';
      el('sSemana').textContent     = stats.semana      || '0';
    }

    if (!fRes.ok) throw new Error('No autorizado');
    const { submissions } = await fRes.json();
    allSubmissions = submissions;
    applyFilters();

  } catch (e) {
    el('tableWrap').innerHTML = `
      <div class="state-box">
        <span class="icon">⚠️</span>
        <h3>Error al cargar</h3>
        <p>${esc(e.message)}</p>
      </div>`;
  }
}

/* ══════════════════════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════════════════════ */
function applyFilters() {
  const q        = el('searchInput').value.toLowerCase().trim();
  const from     = el('dateFrom').value;   // YYYY-MM-DD
  const to       = el('dateTo').value;
  const reviewed = el('filterReviewed').value;

  filtered = allSubmissions.filter(s => {
    // text search
    if (q) {
      const hay = [s.nombre, s.apellido, s.email, s.telefono]
        .filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    // date range
    if (from || to) {
      const iso = s.fecha_iso || '';          // YYYY-MM-DD
      if (from && iso < from) return false;
      if (to   && iso > to)   return false;
    }
    // reviewed status
    if (reviewed !== '') {
      const isRev = s.reviewed === true || s.reviewed === 't' || s.reviewed === 'true';
      if (reviewed === 'true'  && !isRev) return false;
      if (reviewed === 'false' &&  isRev) return false;
    }
    return true;
  });

  updateFilterTags(q, from, to, reviewed);
  renderTable(filtered);
}

function clearFilters() {
  el('searchInput').value = '';
  el('dateFrom').value    = '';
  el('dateTo').value      = '';
  el('filterReviewed').value = '';
  applyFilters();
}

function updateFilterTags(q, from, to, reviewed) {
  const tags = [];
  if (q)        tags.push(`"${q}"`);
  if (from)     tags.push(`Desde ${from}`);
  if (to)       tags.push(`Hasta ${to}`);
  if (reviewed === 'false') tags.push('Sin revisar');
  if (reviewed === 'true')  tags.push('Revisadas');

  el('activeFilters').innerHTML = tags
    .map(t => `<span class="filter-tag">⚡ ${esc(t)}</span>`)
    .join(' ');
}

/* ══════════════════════════════════════════════════════════════
   RENDER TABLE
══════════════════════════════════════════════════════════════ */
function renderTable(rows) {
  const cnt = el('resultCount');
  cnt.textContent = rows.length > 0
    ? `${rows.length} ficha${rows.length !== 1 ? 's' : ''}`
    : '';

  if (rows.length === 0) {
    el('tableWrap').innerHTML = `
      <div class="state-box">
        <span class="icon">📭</span>
        <h3>Sin resultados</h3>
        <p>No hay fichas que coincidan con los filtros actuales.</p>
      </div>`;
    return;
  }

  const rowsHTML = rows.map(s => {
    const isNew = !(s.reviewed === true || s.reviewed === 't' || s.reviewed === 'true');
    return `
    <tr class="${isNew ? 'unread-row' : ''}" onclick="openModal(${s.id})">
      <td class="td-status" data-label="">
        <span class="${isNew ? 'dot-new' : 'dot-ok'}" title="${isNew ? 'Sin revisar' : 'Revisada'}"></span>
      </td>
      <td class="td-name" data-label="Nombre">${esc((s.nombre||'')+' '+(s.apellido||'')).trim() || '—'}</td>
      <td class="td-email" data-label="Email">${esc(s.email||'—')}</td>
      <td class="td-phone" data-label="Teléfono">${esc(s.telefono||'—')}</td>
      <td class="td-date" data-label="Fecha">${esc(s.fecha||'—')}</td>
      <td class="td-actions" data-label="">
        <button class="btn-row btn-view" onclick="event.stopPropagation();openModal(${s.id})">Ver ficha</button>
        <button class="btn-row btn-review-row ${isNew ? '' : 'done'}" title="${isNew ? 'Marcar revisada' : 'Marcar sin revisar'}"
          onclick="event.stopPropagation();quickReview(${s.id},${isNew})">${isNew ? '✓' : '↺'}</button>
        <button class="btn-row btn-del-row" title="Eliminar ficha"
          onclick="event.stopPropagation();deleteSub(${s.id})">🗑</button>
      </td>
    </tr>`;
  }).join('');

  el('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th></th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Fecha recibida</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rowsHTML}</tbody>
    </table>`;
}

function setTableLoading() {
  el('tableWrap').innerHTML = `
    <div class="state-box">
      <span class="icon"><span class="spin-icon">⏳</span></span>
      <h3>Cargando...</h3>
    </div>`;
}

/* ══════════════════════════════════════════════════════════════
   QUICK REVIEW (from table row)
══════════════════════════════════════════════════════════════ */
async function quickReview(id, markAsReviewed) {
  await patchReview(id, markAsReviewed);
  const s = allSubmissions.find(x => x.id === id);
  if (s) s.reviewed = markAsReviewed;
  // Update stat badge
  const cur = parseInt(el('sSinRevisar').textContent) || 0;
  el('sSinRevisar').textContent = markAsReviewed ? Math.max(0, cur - 1) : cur + 1;
  applyFilters();
}

/* ══════════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════════ */
async function openModal(id) {
  currentId = id;
  el('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
  el('mName').textContent = 'Cargando...';
  el('mMeta').textContent = '';
  el('mBody').innerHTML = '<div class="state-box"><span class="spin-icon">⏳</span></div>';

  const res  = await fetch(`/api/submissions/${id}`);
  const json = await res.json();
  if (!json.success) {
    el('mBody').innerHTML = '<div class="state-box"><span class="icon">⚠️</span><h3>Error al cargar</h3></div>';
    return;
  }

  const s   = json.submission;
  const d   = s.data || {};
  const rev = s.reviewed === true || s.reviewed === 't' || s.reviewed === 'true';

  el('mName').textContent = `${s.nombre||''} ${s.apellido||''}`.trim() || '(Sin nombre)';
  el('mMeta').innerHTML   = `
    <span class="review-badge ${rev ? 'done' : 'new'}">${rev ? '✓ Revisada' : '● Nueva'}</span>
    &nbsp; ${esc(s.email||'')} · ${esc(s.telefono||'')} · Recibida el ${esc(s.fecha||'')}`;

  // Update review button
  const rb = el('btnModalReview');
  rb.className = `btn-modal btn-modal-review${rev ? ' reviewed' : ''}`;
  rb.textContent = rev ? '↺ Marcar sin revisar' : '✓ Marcar revisada';

  // Print footer date
  el('printFooter').querySelector('#printDate').textContent =
    'Impreso el ' + new Date().toLocaleDateString('es-CL', {day:'2-digit',month:'long',year:'numeric'});

  el('mBody').innerHTML = buildClinicHTML(d, s);
}

function closeModal() {
  el('modalBg').classList.remove('open');
  document.body.style.overflow = '';
  currentId = null;
}

/* Toggle review from modal */
async function toggleReviewModal() {
  if (!currentId) return;
  const s   = allSubmissions.find(x => x.id === currentId);
  const cur = s ? (s.reviewed === true || s.reviewed === 't' || s.reviewed === 'true') : false;
  const now = !cur;
  await patchReview(currentId, now);
  if (s) s.reviewed = now;
  // Re-open with updated data
  await openModal(currentId);
  // Refresh stat
  const stat = parseInt(el('sSinRevisar').textContent) || 0;
  el('sSinRevisar').textContent = now ? Math.max(0, stat - 1) : stat + 1;
  applyFilters();
}

async function patchReview(id, reviewed) {
  await fetch(`/api/submissions/${id}/review`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reviewed })
  });
}

/* ══════════════════════════════════════════════════════════════
   DELETE
══════════════════════════════════════════════════════════════ */
async function deleteSub(id) {
  if (!confirm('¿Eliminar esta ficha permanentemente? Esta acción no se puede deshacer.')) return;
  const res = await fetch(`/api/submissions/${id}`, { method: 'DELETE' });
  if (res.ok) {
    allSubmissions = allSubmissions.filter(s => s.id !== id);
    const cur = parseInt(el('sTotal').textContent) || 1;
    el('sTotal').textContent = cur - 1;
    applyFilters();
  }
}

/* ══════════════════════════════════════════════════════════════
   PRINT
══════════════════════════════════════════════════════════════ */
function printFicha() {
  window.print();
}

/* ══════════════════════════════════════════════════════════════
   EXPORT  —  CSV
══════════════════════════════════════════════════════════════ */
function exportCSV() {
  if (!filtered.length) { alert('No hay fichas visibles para exportar.'); return; }

  const headers = ['ID','Nombre','Apellido','Email','Teléfono','Fecha','Revisada'];
  const rows = filtered.map(s => [
    s.id,
    s.nombre||'',
    s.apellido||'',
    s.email||'',
    s.telefono||'',
    s.fecha||'',
    (s.reviewed===true||s.reviewed==='t'||s.reviewed==='true') ? 'Sí' : 'No'
  ]);

  const csv = [headers, ...rows]
    .map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
    .join('\n');

  const bom  = '\uFEFF'; // UTF-8 BOM for Excel compatibility
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  downloadBlob(blob, `fichas-carla-${dateStr()}.csv`);
}

/* ══════════════════════════════════════════════════════════════
   EXPORT  —  XLSX  (SheetJS)
══════════════════════════════════════════════════════════════ */
function exportXLSX() {
  if (!filtered.length) { alert('No hay fichas visibles para exportar.'); return; }
  if (typeof XLSX === 'undefined') { alert('La librería de Excel no está disponible. Verifica tu conexión.'); return; }

  const headers = ['ID','Nombre','Apellido','Email','Teléfono','Fecha recibida','Revisada'];
  const data = [
    headers,
    ...filtered.map(s => [
      s.id,
      s.nombre||'',
      s.apellido||'',
      s.email||'',
      s.telefono||'',
      s.fecha||'',
      (s.reviewed===true||s.reviewed==='t'||s.reviewed==='true') ? 'Sí' : 'No'
    ])
  ];

  const ws = XLSX.utils.aoa_to_sheet(data);

  // Column widths
  ws['!cols'] = [
    {wch:6},{wch:18},{wch:18},{wch:32},{wch:16},{wch:20},{wch:10}
  ];

  // Style header row (bold)
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let c = range.s.c; c <= range.e.c; c++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c });
    if (!ws[addr]) continue;
    ws[addr].s = { font: { bold: true }, fill: { fgColor: { rgb: 'FDF5F0' } } };
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Fichas');
  XLSX.writeFile(wb, `fichas-carla-${dateStr()}.xlsx`);
}

/* ══════════════════════════════════════════════════════════════
   BUILD CLINICAL RECORD HTML
══════════════════════════════════════════════════════════════ */
function buildClinicHTML(d, s) {
  const f = (key, val, full) => {
    const empty = !val || val === 'no';
    return `
      <div class="clinic-field${full?' full':''}">
        <div class="cf-key">${key}</div>
        <div class="cf-val${empty?' empty':''}">${esc(val||'No informado')}</div>
      </div>`;
  };
  const fh = (key, val, full) => `
    <div class="clinic-field${full?' full':''}">
      <div class="cf-key">${key}</div>
      <div class="cf-val${val?'':' empty'}"><span class="${val?'highlight':''}">${esc(val||'No informado')}</span></div>
    </div>`;

  // Build hábitos string
  const habitos = [
    d.alcohol==='si' ? `🍷 Alcohol (${d.alcohol_frec||''} ${d.alcohol_cant||''})`.trim() : '',
    d.tabaco ==='si' ? `🚬 Tabaco (${d.tabaco_frec||''} ${d.tabaco_cant||''})`.trim() : '',
    d.drogas ==='si' ? '⚠️ Otras sustancias' : ''
  ].filter(Boolean).join('  ·  ') || 'No reporta';

  // Medicamentos
  let medBlock = '<div class="clinic-field full"><div class="cf-key">Medicamentos</div><div class="cf-val empty">No consume medicamentos</div></div>';
  if (d.tieneMed === 'si') {
    medBlock = `
      ${f('Medicamento', d.medNombre)} ${f('Frecuencia', d.medFrecuencia)}
      ${f('Dosis', d.medDosis)} ${f('Motivo', d.medMotivo)}`;
  }

  // Suplementos
  let supBlock = '';
  if (d.tieneSup === 'si') {
    supBlock = `
      ${f('Suplemento', d.supNombre)} ${f('Frecuencia', d.supFrecuencia)} ${f('Marca', d.supMarca)}`;
  }
  if (d.tieneSupDep === 'si') {
    supBlock += `
      ${f('Sup. deportivo', d.supDepNombre)} ${f('Frec. dep.', d.supDepFrecuencia)} ${f('Marca dep.', d.supDepMarca)}`;
  }
  if (!supBlock) supBlock = '<div class="clinic-field full"><div class="cf-key">Suplementos</div><div class="cf-val empty">No consume suplementos</div></div>';

  return `
    <!-- SECCIÓN 1 -->
    <div class="clinic-section">
      <div class="clinic-section-title">👤 Datos de Identificación</div>
      <div class="clinic-grid">
        ${f('Nombre', d.nombre)} ${f('Apellido', d.apellido)}
        ${f('Edad', d.edad ? d.edad+' años' : '')} ${f('Fecha de nacimiento', d.fechaNacimiento)}
        ${f('Email', d.email)} ${f('Teléfono', d.telefono ? '+569 '+d.telefono : '')}
        ${f('Ciudad / Comuna', d.comuna)} ${f('Estado civil', d.estadoCivil)}
        ${f('Nacionalidad', d.nacionalidad)} ${f('Jornada laboral', d.jornada)}
        ${f('Transporte habitual', d.transporte)} ${f('¿Con quién vive?', d.convivencia, true)}
        ${f('Ocupación', d.ocupacion, true)}
      </div>
    </div>

    <!-- SECCIÓN 2 -->
    <div class="clinic-section">
      <div class="clinic-section-title">🎯 Historia Clínica y Objetivos</div>
      <div class="clinic-grid">
        ${fh('Motivación para consultar', d.motivacion, true)}
        ${fh('Objetivo principal', d.objetivo ? d.objetivo.replace(/,/g, ' · ') : '', true)}
        ${f('Cirugía previa', d.tieneCirugia==='si' ? 'Sí — '+(d.cirugia||'No especificada') : 'No')}
        ${f('Dieta previa', d.dietaPrevia)}
        ${f('Enfermedad diagnosticada', d.tieneEnfermedad==='si' ? 'Sí — '+(d.cualEnfermedad||'No especificada') : 'No', true)}
      </div>
    </div>

    <!-- SECCIÓN 3 -->
    <div class="clinic-section">
      <div class="clinic-section-title">💊 Medicamentos y Suplementos</div>
      <div class="clinic-grid">
        ${medBlock}
        ${supBlock}
      </div>
    </div>

    <!-- SECCIÓN 4 -->
    <div class="clinic-section">
      <div class="clinic-section-title">🍽 Alimentación y Hábitos Diarios</div>
      <div class="clinic-grid">
        ${f('Tipo de alimentación', d.tipoAlimentacion ? d.tipoAlimentacion.replace(/,/g,' · ') : '', true)}
        ${f('N° comidas al día', d.nComidas)} ${f('Agua al día', d.agua)}
        ${f('Horario desayuno', d.desayunoHora)} ${f('Descripción desayuno', d.desayunoDesc, true)}
        ${f('Horario almuerzo', d.almuerzoHora)} ${f('Descripción almuerzo', d.almuerzoDesc, true)}
        ${f('Horario once/merienda', d.onceHora)} ${f('Descripción once', d.onceDesc, true)}
        ${f('Horario cena', d.cenaHora)} ${f('Descripción cena', d.cenaDesc, true)}
        ${f('Snacks / colaciones', d.snacks, true)}
        ${f('Alergias / intolerancias', d.alergias, true)}
        ${f('Color de orina', d.colorOrina)} ${f('Calidad del sueño', d.sueno)}
        ${f('Horas de sueño', d.horasSueno)} ${f('Nivel de estrés', d.estres)}
        ${f('Hábitos de alcohol / tabaco', habitos, true)}
      </div>
    </div>

    <!-- SECCIÓN 5 -->
    <div class="clinic-section">
      <div class="clinic-section-title">🏃 Actividad Física</div>
      <div class="clinic-grid">
        ${f('Realiza actividad física', d.tieneActividad==='si' ? 'Sí' : 'No')}
        ${f('Tipo de actividad', d.actividadTipo)}
        ${f('Frecuencia semanal', d.actividadFrecuencia)}
        ${f('Duración por sesión', d.actividadDuracion)}
        ${f('Horario preferido', d.actividadHorario)}
        ${f('Objetivo físico', d.objetivoFisico, true)}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════════ */
function el(id) { return document.getElementById(id); }
function esc(str) {
  return String(str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function dateStr() {
  return new Date().toISOString().split('T')[0];
}
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), { href: url, download: name });
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
}

/* ══════════════════════════════════════════════════════════════
   KEYBOARD + CLICK OUTSIDE
══════════════════════════════════════════════════════════════ */
document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
loadData();
</script>
</body>
</html>
